services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/expense_tracker.db
      JWT_SECRET: change-me
      ACCESS_TOKEN_EXPIRE_MINUTES: "120"
      ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
